version: "3.9"

# OrgAudi — Stack de desenvolvimento local
#
# Banco de dados: Supabase (cloud) — não sobe Postgres local.
# Apenas Redis é necessário localmente para rate-limit e revogação de tokens.
#
# Pré-requisitos:
#   Copiar .env.example → config.env e preencher SUPABASE_URL, SUPABASE_ANON_KEY, etc.
#   DATABASE_URL deve apontar para Supabase (Transaction Pooler porta 6543).
#
# Uso:
#   docker compose up -d          # sobe apenas Redis
#   docker compose down           # para Redis (dados persistem no volume)
#   docker compose down -v        # apaga volume Redis

services:
  redis:
    image: redis:7-alpine
    container_name: orgaudi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - orgaudi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  orgaudi_redis_data:
