[alembic]
script_location = alembic
prepend_sys_path = .
# Migrations produção: $env:DATABASE_URL=$env:DATABASE_URL_DIRECT; alembic upgrade head
# Migrations dev: alembic upgrade head  (usa SQLite abaixo, sem variável adicional)
sqlalchemy.url = sqlite:///./orgatec_sovereign.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
