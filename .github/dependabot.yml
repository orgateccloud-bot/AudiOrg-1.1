version: 2

updates:
  # Python (backend)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "orgateccloud-bot"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor:
        update-types:
          - "minor"
          - "patch"

  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "orgateccloud-bot"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "orgateccloud-bot"
    commit-message:
      prefix: "ci(deps)"
