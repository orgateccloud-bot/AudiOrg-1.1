# ============================================================
#
# ATENÇÃO: NÃO commite este arquivo com valores reais!
#          Use o script scripts/setup_supabase_secret.sh ou
#          crie o Secret diretamente via kubectl (veja abaixo).
#
# Este arquivo é um TEMPLATE de referência.
# Os valores são placeholders base64 de strings vazias ("").
#
# Como criar o Secret com valores reais:
#
#   kubectl create secret generic orgaudi-supabase \
#     --from-literal=SUPABASE_URL="https://bfumcgchpwtbukahvbng.supabase.co" \
#     --from-literal=SUPABASE_ANON_KEY="eyJ..." \
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY="eyJ..." \
#     --from-literal=SUPABASE_JWT_SECRET="seu-jwt-secret" \
#     --from-literal=DATABASE_URL="postgresql://postgres.bfumcgchpwtbukahvbng:<pwd>@aws-1-sa-east-1.pooler.supabase.com:6543/postgres" \
#     --from-literal=DATABASE_URL_DIRECT="postgresql://postgres:<pwd>@db.bfumcgchpwtbukahvbng.supabase.co:5432/postgres" \
#     --from-literal=JWT_SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(64))')" \
#     -n orgaudi --dry-run=client -o yaml | kubectl apply -f -
#
# Obtenha as chaves em: Supabase Dashboard -> Settings -> API
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: orgaudi-supabase
  namespace: orgaudi
  labels:
    app.kubernetes.io/name: orgaudi
    app.kubernetes.io/component: supabase-credentials
  annotations:
    # Indica que este Secret deve ser gerenciado externamente (não pelo Helm diretamente)
    helm.sh/resource-policy: keep
type: Opaque
# ATENÇÃO: Substitua os valores abaixo pelos reais codificados em base64:
#   echo -n "valor_real" | base64
# Ou use o comando kubectl create secret acima (mais seguro).
stringData:
  SUPABASE_URL: "https://bfumcgchpwtbukahvbng.supabase.co"
  SUPABASE_ANON_KEY: "SUBSTITUIR_PELA_ANON_KEY_REAL"
  SUPABASE_SERVICE_ROLE_KEY: "SUBSTITUIR_PELA_SERVICE_ROLE_KEY_REAL"
  SUPABASE_JWT_SECRET: "SUBSTITUIR_PELO_JWT_SECRET_REAL"
  DATABASE_URL: "postgresql://postgres.bfumcgchpwtbukahvbng:SENHA@aws-1-sa-east-1.pooler.supabase.com:6543/postgres"
  DATABASE_URL_DIRECT: "postgresql://postgres:SENHA@db.bfumcgchpwtbukahvbng.supabase.co:5432/postgres"
  JWT_SECRET_KEY: "GERAR_COM_SECRETS_TOKEN_URLSAFE_64"
