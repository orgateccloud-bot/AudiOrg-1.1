apiVersion: v1
kind: Service
metadata:
  name: {{ include "orgaudi.fullname" . }}-backend
  labels:
    {{- include "orgaudi.labels" . | nindent 4 }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "orgaudi.selectorLabels" . | nindent 4 }}
    component: backend
