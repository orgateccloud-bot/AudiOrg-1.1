{{- if .Values.security.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "orgaudi.fullname" . }}
  labels:
    {{- include "orgaudi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "orgaudi.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8082
  - from:
    - podSelector:
        matchLabels:
          {{- include "orgaudi.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: 8082
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 6333
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
{{- end }}
